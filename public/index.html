<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DropVault — Secure File Sharing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #7f543d;
      --surface:#c4a484;
      --surface2: #faf9f6;
      --border: #252830;
      --accent: brown;
      --accent-glow: brown;
      --accent2: #c4a484;
      --success: #3ba55c;
      --danger: #ed4245;
      --warning: #faa61a;
      --text: black;
      --muted: #6b7280;
      --mono: 'Space Mono', monospace;
      --sans: 'Inter', sans-serif;
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(88,101,242,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(88,101,242,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container { max-width: 900px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }

    /* Header */
    header {
      padding: 28px 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: var(--mono);
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .logo-icon {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }
    .logo span { color: var(--accent2); }
    .stats-bar {
      display: flex;
      gap: 20px;
      font-size: 0.78rem;
      color: var(--muted);
      font-family: var(--mono);
    }
    .stats-bar b { color: var(--text); }

    /* Upload zone */
    .upload-section { padding: 36px 0 24px; }
    .section-label {
      font-size: 0.72rem;
      font-family: var(--mono);
      letter-spacing: 0.12em;
      color: var(--accent2);
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: 16px;
      padding: 56px 32px;
      text-align: center;
      cursor: pointer;
      transition: all 0.25s ease;
      position: relative;
      background: var(--surface);
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--accent);
      background: var(--surface2);
      box-shadow: 0 0 40px var(--accent-glow);
    }
    .drop-zone.drag-over { transform: scale(1.01); }

    .drop-icon {
      font-size: 48px;
      margin-bottom: 16px;
      display: block;
      filter: grayscale(0.3);
    }
    .drop-title {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .drop-sub {
      color: var(--muted);
      font-size: 0.88rem;
      margin-bottom: 24px;
      line-height: 1.6;
    }
    .drop-sub strong { color: var(--text); }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 22px;
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      font-family: var(--sans);
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { background: #4752c4; transform: translateY(-1px); }
    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { border-color: var(--muted); color: var(--text); }
    .btn-danger {
      background: transparent;
      color: var(--danger);
      border: 1px solid transparent;
      padding: 6px 10px;
      font-size: 0.8rem;
    }
    .btn-danger:hover { background: rgba(237,66,69,0.1); border-color: var(--danger); }

    #fileInput { display: none; }

    /* Upload queue (pre-upload preview) */
    .queue-section { margin-top: 20px; display: none; }
    .queue-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .queue-list { display: flex; flex-direction: column; gap: 8px; }
    .queue-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
    }
    .queue-item .file-icon { font-size: 22px; flex-shrink: 0; }
    .queue-item .file-info { flex: 1; min-width: 0; }
    .queue-item .file-name {
      font-size: 0.88rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .queue-item .file-size { font-size: 0.75rem; color: var(--muted); font-family: var(--mono); }
    .remove-queue { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; padding: 2px 6px; border-radius: 4px; transition: 0.15s; }
    .remove-queue:hover { color: var(--danger); background: rgba(237,66,69,0.1); }

    /* Progress */
    .upload-progress { margin-top: 20px; display: none; }
    .progress-item { margin-bottom: 14px; }
    .progress-top {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 6px;
      font-size: 0.83rem;
    }
    .progress-name { font-weight: 500; }
    .progress-pct { font-family: var(--mono); color: var(--accent2); }
    .progress-bar-track {
      height: 4px;
      background: var(--surface2);
      border-radius: 4px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 4px;
      transition: width 0.3s ease;
      width: 0%;
    }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      z-index: 999;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .toast-msg {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 260px;
      animation: slideIn 0.3s ease;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .toast-msg.success { border-color: var(--success); }
    .toast-msg.error { border-color: var(--danger); }
    @keyframes slideIn {
      from { transform: translateX(120%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    /* Files list */
    .files-section { padding: 8px 0 48px; }
    .files-toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      transition: all 0.15s;
      font-family: var(--sans);
    }
    .filter-btn.active, .filter-btn:hover {
      border-color: var(--accent);
      color: var(--text);
      background: rgba(88,101,242,0.1);
    }
    .search-input {
      margin-left: auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 14px;
      font-size: 0.83rem;
      color: var(--text);
      font-family: var(--sans);
      outline: none;
      width: 200px;
      transition: 0.2s;
    }
    .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    .search-input::placeholder { color: var(--muted); }

    .files-grid { display: flex; flex-direction: column; gap: 10px; }
    .file-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: all 0.2s;
      animation: fadeUp 0.3s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .file-card:hover { border-color: #333640; transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,0,0,0.3); }

    .file-thumb {
      width: 44px; height: 44px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      overflow: hidden;
      background: var(--surface2);
    }
    .file-thumb img { width: 100%; height: 100%; object-fit: cover; }

    .file-meta { flex: 1; min-width: 0; }
    .file-name-row {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 4px;
    }
    .file-card-name {
      font-size: 0.9rem;
      font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      flex: 1;
    }
    .file-badge {
      font-size: 0.68rem;
      font-family: var(--mono);
      padding: 2px 7px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      flex-shrink: 0;
    }
    .badge-image { background: rgba(87,199,227,0.15); color: var(--accent2); }
    .badge-pdf { background: rgba(237,66,69,0.15); color: #ff7b7d; }
    .badge-video { background: rgba(250,166,26,0.15); color: var(--warning); }
    .badge-audio { background: rgba(88,101,242,0.15); color: var(--accent); }
    .badge-text { background: rgba(59,165,92,0.15); color: var(--success); }
    .badge-archive { background: rgba(155,155,155,0.15); color: #aaa; }
    .badge-document { background: rgba(130,88,242,0.15); color: #a788f5; }
    .badge-other { background: rgba(100,100,100,0.15); color: var(--muted); }

    .file-details {
      display: flex; gap: 16px;
      font-size: 0.75rem;
      color: var(--muted);
      font-family: var(--mono);
    }


    .file-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .action-btn {
      padding: 7px 12px;
      border-radius: 7px;
      font-size: 0.8rem;
      cursor: pointer;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      transition: all 0.15s;
      font-family: var(--sans);
      font-weight: 500;
    }
    .action-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(88,101,242,0.08); }
    .action-btn.copy-btn.copied { border-color: var(--success); color: var(--success); }

    .empty-state {
      text-align: center;
      padding: 64px 32px;
      color: var(--muted);
    }
    .empty-icon { font-size: 48px; margin-bottom: 16px; display: block; }
    .empty-state p { font-size: 0.9rem; }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 100;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      max-width: 560px;
      width: 90%;
      max-height: 85vh;
      overflow-y: auto;
      animation: popIn 0.25s ease;
    }
    @keyframes popIn {
      from { transform: scale(0.95); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
    }
    .modal-title { font-size: 1rem; font-weight: 600; }
    .modal-close {
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 22px; line-height: 1;
      padding: 4px; border-radius: 6px; transition: 0.15s;
    }
    .modal-close:hover { color: var(--text); background: var(--surface2); }
    .modal-preview img, .modal-preview iframe {
      width: 100%; border-radius: 8px; max-height: 400px; object-fit: contain;
    }
    .modal-preview iframe { height: 400px; border: none; background: #fff; }
    .modal-info { margin-top: 16px; }
    .info-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 9px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.83rem;
    }
    .info-row:last-child { border-bottom: none; }
    .info-label { color: var(--muted); }
    .info-val { font-family: var(--mono); font-size: 0.8rem; }
    .share-box {
      margin-top: 16px;
      display: flex; gap: 8px;
    }
    .share-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 12px;
      font-size: 0.8rem;
      color: var(--muted);
      font-family: var(--mono);
      outline: none;
    }

    @media (max-width: 600px) {
      .stats-bar { display: none; }
      .file-details { gap: 8px; }
      .file-actions { flex-direction: column; gap: 4px; }
      .search-input { width: 140px; }
    }
  </style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo">
      <div class="logo-icon"></div>
      Clinton's<span>Project</span>
    </div>
    <div class="stats-bar" id="statsBar">
      <span>Files: <b id="statFiles">0</b></span>
      <span>Size: <b id="statSize">0 B</b></span>
      <span>Downloads: <b id="statDownloads">0</b></span>
    </div>
  </header>

  <!-- Upload Section -->
  <div class="upload-section">
    <div class="section-label">Upload your Files</div>

    <div class="drop-zone" id="dropZone">
      <span class="drop-icon">☁️</span>
      <div class="drop-title">upload your files here</div>
      <div class="drop-sub">
        or <strong>click to browse</strong> · Max 50MB per file · Up to 10 files at once<br>
        Images, PDFs, audio, documents, archives
      </div>
      <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">
        📁 Choose Files
      </button>
    </div>
    <input type="file" id="fileInput" multiple />

    <!-- Queue -->
    <div class="queue-section" id="queueSection">
      <div class="queue-header">
        <div class="section-label" style="margin:0">Ready to upload (<span id="queueCount">0</span>)</div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-ghost" onclick="clearQueue()">Clear</button>
          <button class="btn btn-primary" id="uploadBtn" onclick="doUpload()">⬆ Upload All</button>
        </div>
      </div>
      <div class="queue-list" id="queueList"></div>
    </div>

    <!-- Progress -->
    <div class="upload-progress" id="uploadProgress">
      <div class="section-label">Uploading...</div>
      <div id="progressItems"></div>
    </div>
  </div>

  <!-- Files Section -->
  <div class="files-section">
    <div class="files-toolbar">
      <div class="section-label" style="margin:0">Your Files</div>
      <button class="filter-btn active" data-cat="all">All</button>
      <button class="filter-btn" data-cat="image">Images</button>
      <button class="filter-btn" data-cat="pdf">PDFs</button>
      <!-- <button class="filter-btn" data-cat="video">Video</button> -->
      <button class="filter-btn" data-cat="document">Docs</button>
      <!-- <button class="filter-btn" data-cat="other">Other</button> -->
      <input class="search-input" id="searchInput" type="text" placeholder="Search files..." />
    </div>
    <div class="files-grid" id="filesGrid"></div>
  </div>
</div>

<!-- Preview Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">File Details</div>
      <button class="modal-close" onclick="closeModalDirect()">×</button>
    </div>
    <div class="modal-preview" id="modalPreview"></div>
    <div class="modal-info" id="modalInfo"></div>
    <div class="share-box">
      <input class="share-input" id="shareUrl" readonly />
      <button class="btn btn-primary" onclick="copyShareUrl()">Copy Link</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  let queuedFiles = [];
  let allFiles = [];
  let activeFilter = 'all';

  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');

  // Drag & drop
  ['dragenter','dragover'].forEach(e => dropZone.addEventListener(e, ev => {
    ev.preventDefault();
    dropZone.classList.add('drag-over');
  }));
  ['dragleave','drop'].forEach(e => dropZone.addEventListener(e, () => dropZone.classList.remove('drag-over')));
  dropZone.addEventListener('drop', ev => {
    ev.preventDefault();
    addToQueue([...ev.dataTransfer.files]);
  });
  dropZone.addEventListener('click', e => {
    if (e.target.tagName !== 'BUTTON') fileInput.click();
  });
  fileInput.addEventListener('change', () => {
    addToQueue([...fileInput.files]);
    fileInput.value = '';
  });

  function addToQueue(files) {
    const MAX = 50 * 1024 * 1024;
    files.forEach(f => {
      if (f.size > MAX) { showToast(`"${f.name}" is too large (max 50MB)`, 'error'); return; }
      if (queuedFiles.find(q => q.name === f.name && q.size === f.size)) return;
      queuedFiles.push(f);
    });
    renderQueue();
  }

  function renderQueue() {
    const section = document.getElementById('queueSection');
    const list = document.getElementById('queueList');
    const count = document.getElementById('queueCount');
    if (!queuedFiles.length) { section.style.display = 'none'; return; }
    section.style.display = 'block';
    count.textContent = queuedFiles.length;
    list.innerHTML = queuedFiles.map((f, i) => `
      <div class="queue-item">
        <div class="file-icon">${fileIcon(f.type)}</div>
        <div class="file-info">
          <div class="file-name">${escHtml(f.name)}</div>
          <div class="file-size">${fmtBytes(f.size)}</div>
        </div>
        <button class="remove-queue" onclick="removeFromQueue(${i})">×</button>
      </div>
    `).join('');
  }

  function removeFromQueue(i) {
    queuedFiles.splice(i, 1);
    renderQueue();
  }

  function clearQueue() {
    queuedFiles = [];
    renderQueue();
  }

  async function doUpload() {
    if (!queuedFiles.length) return;
    const btn = document.getElementById('uploadBtn');
    btn.disabled = true;
    document.getElementById('queueSection').style.display = 'none';
    document.getElementById('uploadProgress').style.display = 'block';
    const progressItems = document.getElementById('progressItems');
    progressItems.innerHTML = queuedFiles.map((f, i) => `
      <div class="progress-item" id="prog-${i}">
        <div class="progress-top">
          <span class="progress-name">${escHtml(f.name)}</span>
          <span class="progress-pct" id="pct-${i}">0%</span>
        </div>
        <div class="progress-bar-track">
          <div class="progress-bar-fill" id="bar-${i}"></div>
        </div>
      </div>
    `).join('');

    const formData = new FormData();
    queuedFiles.forEach(f => formData.append('files', f));

    const xhr = new XMLHttpRequest();
    xhr.upload.addEventListener('progress', e => {
      if (e.lengthComputable) {
        const pct = Math.round(e.loaded / e.total * 100);
        queuedFiles.forEach((_, i) => {
          document.getElementById(`bar-${i}`).style.width = pct + '%';
          document.getElementById(`pct-${i}`).textContent = pct + '%';
        });
      }
    });

    xhr.addEventListener('load', () => {
      document.getElementById('uploadProgress').style.display = 'none';
      btn.disabled = false;
      if (xhr.status === 200) {
        const data = JSON.parse(xhr.responseText);
        showToast(`✅ Uploaded ${data.files.length} file(s) successfully!`, 'success');
        queuedFiles = [];
        loadFiles();
        loadStats();
      } else {
        const err = JSON.parse(xhr.responseText);
        showToast(err.error || 'Upload failed.', 'error');
      }
    });

    xhr.addEventListener('error', () => {
      document.getElementById('uploadProgress').style.display = 'none';
      btn.disabled = false;
      showToast('Upload failed. Please try again.', 'error');
    });

    xhr.open('POST', '/api/upload');
    xhr.send(formData);
  }

  async function loadFiles() {
    const res = await fetch('/api/files');
    const data = await res.json();
    allFiles = data.files || [];
    renderFiles();
  }

  function renderFiles() {
    const grid = document.getElementById('filesGrid');
    const search = document.getElementById('searchInput').value.toLowerCase();
    let files = allFiles;
    if (activeFilter !== 'all') {
      if (activeFilter === 'other') files = files.filter(f => !['image','pdf','video','document'].includes(f.category));
      else files = files.filter(f => f.category === activeFilter);
    }
    if (search) files = files.filter(f => f.originalName.toLowerCase().includes(search));

    if (!files.length) {
      grid.innerHTML = `<div class="empty-state"><span class="empty-icon">🗂️</span><p>${allFiles.length ? 'No files match your filter.' : 'Upload your first file to get started.'}</p></div>`;
      return;
    }

    grid.innerHTML = files.map(f => {
      const isImage = f.category === 'image';
      const thumb = isImage
        ? `<div class="file-thumb"><img src="${f.previewUrl}" alt="" loading="lazy" /></div>`
        : `<div class="file-thumb">${fileIcon(f.mimetype)}</div>`;

      return `
        <div class="file-card" data-id="${f.id}">
          ${thumb}
          <div class="file-meta">
            <div class="file-name-row">
              <div class="file-card-name" title="${escHtml(f.originalName)}">${escHtml(f.originalName)}</div>
              <span class="file-badge badge-${f.category}">${f.category}</span>
            </div>
            <div class="file-details">
              <span>${f.sizeFormatted}</span>
              <span>${f.downloads} dl</span>
                // <p>my name is clinton</p>
              <span>${timeAgo(f.uploadedAt)}</span>
            </div>
          </div>
          <div class="file-actions">
            <button class="action-btn" onclick="openPreview('${f.id}')">👁 Preview</button>
            <button class="action-btn copy-btn" id="copy-${f.id}" onclick="copyLink('${f.id}')">🔗 Copy</button>
            <a href="${f.downloadUrl}" download>
              <button class="action-btn">⬇ Download</button>
            </a>
            <button class="action-btn btn-danger" onclick="deleteFile('${f.id}')">🗑</button>
          </div>
        </div>
      `;
    }).join('');
  }

  async function loadStats() {
    const res = await fetch('/api/stats');
    const data = await res.json();
    document.getElementById('statFiles').textContent = data.totalFiles;
    document.getElementById('statSize').textContent = data.totalSize;
    document.getElementById('statDownloads').textContent = data.totalDownloads;
  }

  async function deleteFile(id) {
    if (!confirm('Delete this file permanently?')) return;
    const res = await fetch(`/api/delete/${id}`, { method: 'DELETE' });
    if (res.ok) {
      showToast('File deleted.', 'success');
      loadFiles();
      loadStats();
    } else showToast('Could not delete file.', 'error');
  }

  function copyLink(id) {
    const url = `${location.origin}/api/download/${id}`;
    navigator.clipboard.writeText(url).then(() => {
      const btn = document.getElementById(`copy-${id}`);
      btn.classList.add('copied');
      btn.textContent = '✅ Copied';
      setTimeout(() => { btn.classList.remove('copied'); btn.innerHTML = '🔗 Copy'; }, 2000);
    });
  }

  function openPreview(id) {
    const f = allFiles.find(x => x.id === id);
    if (!f) return;
    document.getElementById('modalTitle').textContent = f.originalName;
    const preview = document.getElementById('modalPreview');


    if (f.category === 'image') {
      preview.innerHTML = `<img src="${f.previewUrl}" alt="${escHtml(f.originalName)}" />`;
    } else if (f.category === 'pdf') {
      preview.innerHTML = `<iframe src="${f.previewUrl}"></iframe>`;
    } else if (f.category === 'video') {
      preview.innerHTML = `<video controls style="width:100%;border-radius:8px"><source src="${f.previewUrl}" type="${f.mimetype}"></video>`;
    } else if (f.category === 'audio') {
      preview.innerHTML = `<audio controls style="width:100%;margin:16px 0"><source src="${f.previewUrl}" type="${f.mimetype}"></audio>`;
    } else {
      preview.innerHTML = `<div style="padding:32px;text-align:center;font-size:48px">${fileIcon(f.mimetype)}<p style="font-size:0.9rem;color:var(--muted);margin-top:12px">No preview available</p></div>`;
    }

    document.getElementById('modalInfo').innerHTML = `
      <div class="info-row"><span class="info-label">Size</span><span class="info-val">${f.sizeFormatted}</span></div>
      <div class="info-row"><span class="info-label">Type</span><span class="info-val">${f.mimetype}</span></div>
      <div class="info-row"><span class="info-label">Uploaded</span><span class="info-val">${new Date(f.uploadedAt).toLocaleString()}</span></div>

      <div class="info-row"><span class="info-label">Downloads</span><span class="info-val">${f.downloads}</span></div>
    `;
    document.getElementById('shareUrl').value = `${location.origin}/api/download/${f.id}`;
    document.getElementById('modalOverlay').classList.add('open');
  }

  function closeModal(e) {
    if (e.target === document.getElementById('modalOverlay')) closeModalDirect();
  }
  function closeModalDirect() {
    document.getElementById('modalOverlay').classList.remove('open');
  }

  function copyShareUrl() {
    const input = document.getElementById('shareUrl');
    navigator.clipboard.writeText(input.value).then(() => showToast('Link copied!', 'success'));
  }

  // Filters
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = btn.dataset.cat;
      renderFiles();
    });
  });
  document.getElementById('searchInput').addEventListener('input', renderFiles);

  // Keyboard
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModalDirect();
  });

  function showToast(msg, type = 'info') {
    const container = document.getElementById('toast');
    const el = document.createElement('div');
    el.className = `toast-msg ${type}`;
    const icons = { success: '✅', error: '❌', info: 'ℹ️' };
    el.innerHTML = `<span>${icons[type]}</span><span>${msg}</span>`;
    container.appendChild(el);
    setTimeout(() => el.remove(), 4000);
  }

  function fileIcon(mime) {
    if (!mime) return '📄';
    if (mime.startsWith('image/')) return '🖼️';
    if (mime.startsWith('video/')) return '🎬';
    if (mime.startsWith('audio/')) return '🎵';
    if (mime === 'application/pdf') return '📕';
    if (mime.startsWith('text/')) return '📝';
    if (mime.includes('zip')) return '📦';
    if (mime.includes('word')) return '📘';
    if (mime.includes('spreadsheet') || mime.includes('excel')) return '📊';
    return '📄';
  }

  function fmtBytes(b) {
    if (b === 0) return '0 B';
    const k = 1024, s = ['B','KB','MB','GB'];
    const i = Math.floor(Math.log(b) / Math.log(k));
    return `${(b / Math.pow(k, i)).toFixed(1)} ${s[i]}`;
  }

  function timeAgo(iso) {
    const d = Math.floor((Date.now() - new Date(iso)) / 1000);
    if (d < 60) return 'just now';
    if (d < 3600) return `${Math.floor(d/60)}m ago`;
    if (d < 86400) return `${Math.floor(d/3600)}h ago`;
    return `${Math.floor(d/86400)}d ago`;
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Init
  loadFiles();
  loadStats();
  setInterval(loadStats, 30000);
</script>
</body>
</html>
