services:
  - type: web
    name: dropvault
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    disk:
      name: uploads-disk
      mountPath: /opt/render/project/src/uploads
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
